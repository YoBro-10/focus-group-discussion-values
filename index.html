<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Culture Values Alignment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { touch-action: manipulation; }
        .word-tag { transition: transform 0.1s ease; }
        .word-tag:active { transform: scale(0.95); }
        .selected-word { ring: 4px solid #4f46e5 !important; transform: scale(1.05); }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmjEUCPkpSXSjIu_3Aie4R4VkLg1E-i30",
            authDomain: "focus-group-discussion-word.firebaseapp.com",
            databaseURL: "https://focus-group-discussion-word-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "focus-group-discussion-word",
            storageBucket: "focus-group-discussion-word.firebasestorage.app",
            messagingSenderId: "833887600551",
            appId: "1:833887600551:web:77329c59d24d9b326e4082"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const initialWords = [
            { text: 'Trust', color: 'bg-blue-100 border-blue-400' }, { text: 'Teamwork', color: 'bg-blue-100 border-blue-400' },
            { text: 'Respect', color: 'bg-blue-100 border-blue-400' }, { text: 'Communication', color: 'bg-blue-100 border-blue-400' },
            { text: 'Care', color: 'bg-blue-100 border-blue-400' }, { text: 'Empowerment', color: 'bg-blue-100 border-blue-400' },
            { text: 'Warm', color: 'bg-blue-100 border-blue-400' }, { text: 'Friendly', color: 'bg-blue-100 border-blue-400' },
            { text: 'Honest', color: 'bg-blue-100 border-blue-400' }, { text: 'Transparent', color: 'bg-blue-100 border-blue-400' },
            { text: 'Innovation', color: 'bg-green-100 border-green-400' }, { text: 'Creativity', color: 'bg-green-100 border-green-400' },
            { text: 'Agility', color: 'bg-green-100 border-green-400' }, { text: 'Experimentation', color: 'bg-green-100 border-green-400' },
            { text: 'Growth', color: 'bg-green-100 border-green-400' }, { text: 'Learning', color: 'bg-green-100 border-green-400' },
            { text: 'Vision', color: 'bg-green-100 border-green-400' }, { text: 'Adaptability', color: 'bg-green-100 border-green-400' },
            { text: 'Genuine', color: 'bg-green-100 border-green-400' },
            { text: 'Stability', color: 'bg-orange-100 border-orange-400' }, { text: 'Consistency', color: 'bg-orange-100 border-orange-400' },
            { text: 'Order', color: 'bg-orange-100 border-orange-400' }, { text: 'Efficiency', color: 'bg-orange-100 border-orange-400' },
            { text: 'Accountability', color: 'bg-orange-100 border-orange-400' }, { text: 'Compliance', color: 'bg-orange-100 border-orange-400' },
            { text: 'Discipline', color: 'bg-orange-100 border-orange-400' }, { text: 'Standardisation', color: 'bg-orange-100 border-orange-400' },
            { text: 'Reliable', color: 'bg-orange-100 border-orange-400' },
            { text: 'Competitive', color: 'bg-purple-100 border-purple-400' }, { text: 'Performance', color: 'bg-purple-100 border-purple-400' },
            { text: 'Service', color: 'bg-purple-100 border-purple-400' }, { text: 'Excellence', color: 'bg-purple-100 border-purple-400' },
            { text: 'Speed', color: 'bg-purple-100 border-purple-400' }, { text: 'Goals', color: 'bg-purple-100 border-purple-400' },
            { text: 'Inspire', color: 'bg-purple-100 border-purple-400' }, { text: 'Confidence', color: 'bg-purple-100 border-purple-400' }
        ];

        const baskets = [
            { id: 'basket1', name: 'Clan Culture (Collaborate)' },
            { id: 'basket2', name: 'Adhocracy Culture (Create)' },
            { id: 'basket3', name: 'Market Culture (Compete)' },
            { id: 'basket4', name: 'Hierarchy Culture (Control)' }
        ];

        let app = null;

        class FocusGroupApp {
            constructor() {
                this.userId = this.getUserId();
                this.myAvailableWords = this.loadMyWords();
                this.sharedBaskets = { basket1: [], basket2: [], basket3: [], basket4: [] };
                this.draggedWord = null;
                this.draggedFrom = null;
                this.loading = true;
                this.isAdmin = new URLSearchParams(window.location.search).get('role') === 'admin';
                this.init();
            }

            getUserId() {
                let id = localStorage.getItem('fg-val-id-v8');
                if (!id) {
                    id = 'u_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('fg-val-id-v8', id);
                }
                return id;
            }

            loadMyWords() {
                const saved = localStorage.getItem('my-val-list-v8');
                return saved ? JSON.parse(saved) : [...initialWords];
            }

            saveMyWords() { 
                localStorage.setItem('my-val-list-v8', JSON.stringify(this.myAvailableWords)); 
            }

            async init() {
                try {
                    await firebase.auth().signInAnonymously();
                    this.setupPresence();
                    database.ref('baskets').on('value', (s) => {
                        this.sharedBaskets = s.val() || { basket1: [], basket2: [], basket3: [], basket4: [] };
                        this.loading = false;
                        this.render();
                    });
                } catch (e) { 
                    console.error("Init error:", e);
                    this.loading = false;
                    this.render(); 
                }
            }

            setupPresence() {
                const statusRef = database.ref('/status/' + this.userId);
                database.ref('.info/connected').on('value', (s) => {
                    if (s.val()) statusRef.onDisconnect().remove().then(() => statusRef.set(true));
                });
                database.ref('/status').on('value', (s) => {
                    const el = document.getElementById('user-count');
                    if (el) el.textContent = s.numChildren() || 0;
                });
            }

            handleSelect(wordText, from) {
                // Toggle selection for click-to-move (mobile friendly)
                if (this.draggedWord === wordText) {
                    this.draggedWord = null;
                    this.draggedFrom = null;
                } else {
                    this.draggedWord = wordText;
                    this.draggedFrom = from;
                }
                this.render();
            }

            async handleDrop(target) {
                if (!this.draggedWord) return;
                const wordText = this.draggedWord;
                const from = this.draggedFrom;
                const wordInfo = initialWords.find(w => w.text === wordText);

                if (from === target) {
                    this.draggedWord = null;
                    return;
                }

                // FLOW 1: From Pool to Basket
                if (from === 'available' && target !== 'available') {
                    this.myAvailableWords = this.myAvailableWords.filter(w => w.text !== wordText);
                    this.saveMyWords();
                    await database.ref(`baskets/${target}`).transaction((current) => {
                        current = current || [];
                        current.push({ word: wordText, userId: this.userId, color: wordInfo.color });
                        return current;
                    });
                } 
                // FLOW 2: From Basket back to Pool
                else if (from !== 'available' && target === 'available') {
                    await database.ref(`baskets/${from}`).transaction((current) => {
                        if (!current) return current;
                        const idx = current.findIndex(i => i.word === wordText && i.userId === this.userId);
                        if (idx > -1) current.splice(idx, 1);
                        return current;
                    });
                    if (!this.myAvailableWords.find(w => w.text === wordText)) {
                        this.myAvailableWords.push(wordInfo);
                        this.saveMyWords();
                    }
                }
                // FLOW 3: From Basket to Basket
                else if (from !== 'available' && target !== 'available') {
                    // Remove from old
                    await database.ref(`baskets/${from}`).transaction((current) => {
                        if (!current) return current;
                        const idx = current.findIndex(i => i.word === wordText && i.userId === this.userId);
                        if (idx > -1) current.splice(idx, 1);
                        return current;
                    });
                    // Add to new
                    await database.ref(`baskets/${target}`).transaction((current) => {
                        current = current || [];
                        current.push({ word: wordText, userId: this.userId, color: wordInfo.color });
                        return current;
                    });
                }

                this.draggedWord = null;
                this.draggedFrom = null;
                this.render();
            }

            async resetAllBaskets() {
                if (confirm('ADMIN: Clear entire board for all users?')) {
                    await database.ref('baskets').set({ basket1: [], basket2: [], basket3: [], basket4: [] });
                }
            }

            resetMyWords() {
                if (confirm('Reset your available words pool? (This won\'t affect items already in baskets)')) {
                    const usedInBaskets = new Set();
                    Object.values(this.sharedBaskets).forEach(b => {
                        if (Array.isArray(b)) {
                            b.forEach(item => { if (item.userId === this.userId) usedInBaskets.add(item.word); });
                        }
                    });
                    this.myAvailableWords = initialWords.filter(w => !usedInBaskets.has(w.text));
                    this.saveMyWords();
                    this.render();
                }
            }

            exportToCSV() {
                let csv = "data:text/csv;charset=utf-8,Basket,Word,Count\n";
                baskets.forEach(b => {
                    const items = this.getBasketDisplay(this.sharedBaskets[b.id]);
                    items.forEach(i => {
                        csv += `"${b.name}","${i.word}",${i.count}\n`;
                    });
                });
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csv));
                link.setAttribute("download", "culture_results.csv");
                link.click();
            }

            getBasketDisplay(items) {
                const groups = {};
                (items || []).forEach(i => {
                    if (!groups[i.word]) groups[i.word] = { count: 0, myCount: 0, color: i.color };
                    groups[i.word].count++;
                    if (i.userId === this.userId) groups[i.word].myCount++;
                });
                return Object.entries(groups).map(([word, d]) => ({
                    word, count: d.count, isMine: d.myCount > 0, color: d.color,
                    display: d.count > 1 ? `${word} (${d.count})` : word
                }));
            }

            escapeHtml(t) { 
                const d = document.createElement('div'); 
                d.textContent = t; 
                return d.innerHTML; 
            }

            render() {
                const root = document.getElementById('root');
                if (this.loading) { 
                    root.innerHTML = '<div class="h-screen flex items-center justify-center font-bold text-slate-500">Connecting to Values Board...</div>'; 
                    return; 
                }

                root.innerHTML = `
                    <div class="min-h-screen p-2 md:p-4 font-sans text-slate-900">
                        <div class="max-w-6xl mx-auto">
                            <div class="text-center mb-6">
                                <h1 class="text-xl md:text-3xl font-black uppercase tracking-tighter">Focus Group - Culture Values</h1>
                                <p class="text-indigo-600 font-bold text-xs md:text-sm">👥 Live Participants: <span id="user-count">...</span></p>
                                
                                <div class="mt-4 flex gap-2 justify-center flex-wrap">
                                    <button onclick="app.resetMyWords()" class="bg-emerald-600 text-white px-4 py-2 rounded-full text-[10px] font-bold uppercase shadow-md">Reset My Pool</button>
                                    ${this.isAdmin ? `
                                        <button onclick="app.exportToCSV()" class="bg-indigo-600 text-white px-4 py-2 rounded-full text-[10px] font-bold uppercase shadow-md">Export CSV</button>
                                        <button onclick="app.resetAllBaskets()" class="bg-rose-600 text-white px-4 py-2 rounded-full text-[10px] font-bold uppercase shadow-md">Clear Board</button>
                                    ` : ''}
                                </div>
                            </div>

                            <div ondragover="event.preventDefault()" ondrop="app.handleDrop('available')" onclick="app.handleDrop('available')"
                                 class="bg-white rounded-2xl shadow-inner p-4 mb-6 border-2 border-dashed border-slate-300 min-h-24 text-center cursor-pointer">
                                <h2 class="font-black text-[10px] uppercase tracking-widest text-slate-400 mb-3">Available Words Pool (Click to select/return)</h2>
                                <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-9 gap-2">
                                    ${this.myAvailableWords.map(w => `
                                        <div draggable="true" 
                                             ondragstart="app.draggedWord='${this.escapeHtml(w.text)}'; app.draggedFrom='available'"
                                             onclick="event.stopPropagation(); app.handleSelect('${this.escapeHtml(w.text)}', 'available')"
                                             class="${w.color} ${this.draggedWord === w.text ? 'selected-word' : ''} border-2 rounded-lg p-2 cursor-grab active:cursor-grabbing text-[10px] text-center font-bold uppercase shadow-sm transition-all">
                                            ${this.escapeHtml(w.text)}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <div
