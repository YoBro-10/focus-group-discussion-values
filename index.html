<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Group Discussion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmjEUCPkpSXSjIu_3Aie4R4VkLg1E-i30",
            authDomain: "focus-group-discussion-word.firebaseapp.com",
            databaseURL: "https://focus-group-discussion-word-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "focus-group-discussion-word",
            storageBucket: "focus-group-discussion-word.firebasestorage.app",
            messagingSenderId: "833887600551",
            appId: "1:833887600551:web:77329c59d24d9b326e4082"
        };

        let database;
        try {
            firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            console.log("Firebase initialized successfully!");
        } catch (error) {
            console.error("Firebase initialization error:", error);
        }

        const initialWords = [
            'Collaboration', 'Commitment', 'Employee involvement', 'Empowerment',
            'Loyalty', 'Mutual respect', 'Open communication', 'People development',
            'Teamwork', 'Trust', 'Adaptability', 'Agility',
            'Continuous Learning', 'Creativity', 'Entrepreneurial thinking', 'Experimentation',
            'Growth', 'Innovation', 'Vision', 'Accountability',
            'Compliance', 'Consistency', 'Discipline', 'Efficiency',
            'Formal authority', 'Order', 'Predictability', 'Stability',
            'Standardization', 'Accountability for outcomes', 'Achievement', 'Competitiveness',
            'Customer focus', 'Goal clarity', 'Performance excellence', 'Productivity',
            'Profitability', 'Results orientation', 'Speed'
        ];

        const baskets = [
            { id: 'basket1', name: 'Clan Culture (Collaborate)', color: 'bg-white border-black' },
            { id: 'basket2', name: 'Adhocracy Culture (Create)', color: 'bg-white border-black' },
            { id: 'basket3', name: 'Market Culture (Compete)', color: 'bg-white border-black' },
            { id: 'basket4', name: 'Hierarchy Culture (Control)', color: 'bg-white border-black' }
        ];

        let app = null;

        class FocusGroupApp {
            constructor() {
                this.userId = this.getUserId();
                this.myAvailableWords = this.loadMyWords();
                this.sharedBaskets = { basket1: [], basket2: [], basket3: [], basket4: [] };
                this.draggedWord = null;
                this.draggedFrom = null;
                this.loading = true;
                this.errorMessage = null;
                
                this.render(); // FIXED: Was this.;
                this.init();
            }

            getUserId() {
                let id = localStorage.getItem('focus-group-user-id');
                if (!id) {
                    id = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('focus-group-user-id', id);
                }
                return id;
            }

            loadMyWords() {
                const saved = localStorage.getItem('my-words-list');
                return saved ? JSON.parse(saved) : [...initialWords];
            }

            saveMyWords() {
                localStorage.setItem('my-words-list', JSON.stringify(this.myAvailableWords));
            }

            setupPresence() {
                const onlineStatusRef = database.ref('.info/connected');
                const userStatusDatabaseRef = database.ref('/status/' + this.userId);
                onlineStatusRef.on('value', (snapshot) => {
                    if (snapshot.val() === false) return;
                    userStatusDatabaseRef.onDisconnect().remove().then(() => {
                        userStatusDatabaseRef.set(true);
                    });
                });
                database.ref('/status').on('value', (snapshot) => {
                    const count = snapshot.numChildren() || 0;
                    const countElement = document.getElementById('user-count');
                    if (countElement) countElement.textContent = count;
                });
            }

            exportToCSV() {
                let csvContent = "data:text/csv;charset=utf-8,Basket,Word,Votes\n";
                baskets.forEach(basket => {
                    const items = this.getBasketDisplay(this.sharedBaskets[basket.id]);
                    items.forEach(item => {
                        const cleanWord = item.word.replace(/,/g, "");
                        csvContent += `${basket.name},${cleanWord},${item.count}\n`;
                    });
                });
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `results_${new Date().toLocaleDateString()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            async init() {
                try {
                    await firebase.auth().signInAnonymously();
                    this.setupPresence();
                    database.ref('baskets').on('value', (snapshot) => {
                        const data = snapshot.val();
                        if (data) this.sharedBaskets = data;
                        this.loading = false;
                        this.render(); // FIXED: Was this.;
                    }, (error) => {
                        this.errorMessage = 'Connection error: ' + error.message;
                        this.loading = false;
                        this.render();
                    });
                } catch (error) {
                    this.errorMessage = error.message;
                    this.loading = false;
                    this.render();
                }
            }

            async saveBaskets() {
                try {
                    const basketsRef = database.ref('baskets');
                    await basketsRef.transaction((current) => {
                        return this.sharedBaskets;
                    });
                } catch (error) {
                    this.showError('Save failed: ' + error.message);
                }
            }

            handleDrop(targetBasket) {
                if (!this.draggedWord) return;
                let newMyWords = [...this.myAvailableWords];
                let newBaskets = JSON.parse(JSON.stringify(this.sharedBaskets));
                if (this.draggedFrom === 'available') {
                    newMyWords = this.myAvailableWords.filter(w => w !== this.draggedWord);
                    if (targetBasket !== 'available') {
                        if (!newBaskets[targetBasket]) newBaskets[targetBasket] = [];
                        newBaskets[targetBasket].push({ word: this.draggedWord, userId: this.userId });
                    }
                } else {
                    const sourceBasket = this.draggedFrom;
                    const myIdx = (newBaskets[sourceBasket] || []).findIndex(i => i.word === this.draggedWord && i.userId === this.userId);
                    if (myIdx === -1) {
                        this.showError("You can only move your own words!");
                        return;
                    }
                    newBaskets[sourceBasket].splice(myIdx, 1);
                    if (targetBasket === 'available') {
                        newMyWords.push(this.draggedWord);
                    } else {
                        if (!newBaskets[targetBasket]) newBaskets[targetBasket] = [];
                        newBaskets[targetBasket].push({ word: this.draggedWord, userId: this.userId });
                    }
                }
                this.myAvailableWords = newMyWords;
                this.sharedBaskets = newBaskets;
                this.saveMyWords();
                this.saveBaskets();
                this.render();
            }

            resetMyWords() {
                const myUsedWords = new Set();
                Object.values(this.sharedBaskets).forEach(basket => {
                    (basket || []).forEach(item => { if (item.userId === this.userId) myUsedWords.add(item.word); });
                });
                this.myAvailableWords = initialWords.filter(word => !myUsedWords.has(word));
                this.saveMyWords();
                this.render();
            }

            async resetAllBaskets() {
                if (!window.location.search.includes('role=admin')) return;
                if (!confirm('Clear all baskets for everyone?')) return;
                this.sharedBaskets = { basket1: [], basket2: [], basket3: [], basket4: [] };
                await this.saveBaskets();
            }

            getBasketDisplay(basketItems) {
                const wordGroups = {};
                (basketItems || []).forEach(item => {
                    if (!wordGroups[item.word]) wordGroups[item.word] = { total: 0, myCount: 0 };
                    wordGroups[item.word].total++;
                    if (item.userId === this.userId) wordGroups[item.word].myCount++;
                });
                return Object.entries(wordGroups).map(([word, data]) => ({
                    word, count: data.total, isMine: data.myCount > 0,
                    display: data.total > 1 ? `${word} (${data.total})` : word
                }));
            }

            showError(message) {
                this.errorMessage = message;
                this.render();
                setTimeout(() => { this.errorMessage = null; this.render(); }, 3000);
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            render() {
                const root = document.getElementById('root');
                if (this.loading) {
                    root.innerHTML = `<div class="min-h-screen flex items-center justify-center"><p>Loading...</p></div>`;
                    return;
                }
                root.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-indigo-50 to-blue-50 p-4">
                        <div class="max-w-6xl mx-auto">
                            <div class="text-center mb-6">
                                <h1 class="text-3xl font-bold text-gray-800 mb-2">Focus Group Discussion - Values</h1>
                                <p class="text-gray-600">🌐 Your words are private • Baskets are shared</p>
                                <p class="text-indigo-600 font-bold mt-2">👥 Active Participants: <span id="user-count">...</span></p>
                                ${this.errorMessage ? `<div class="mt-2 text-red-600 bg-red-50 border p-2">${this.escapeHtml(this.errorMessage)}</div>` : ''}
                                <div class="mt-3 flex gap-2 justify-center flex-wrap">
                                    <button onclick="app.resetMyWords()" class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm">Reset My Words</button>
                                    ${window.location.search.includes('role=admin') ? `
                                        <button onclick="app.exportToCSV()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm">📥 Export (CSV)</button>
                                        <button onclick="app.resetAllBaskets()" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm">Clear All</button>
                                    ` : ''}
                                </div>
                            </div>
                            <div ondragover="event.preventDefault()" ondrop="app.handleDrop('available')" class="bg-white rounded-xl shadow-lg p-4 mb-6 border-2 border-dashed min-h-32">
                                <h2 class="text-lg font-semibold mb-3">My Available Words</h2>
                                <div class="grid grid-cols-4 md:grid-cols-8 gap-2">
                                    ${this.myAvailableWords.map(word => `
                                        <div draggable="true" ondragstart="app.draggedWord='${this.escapeHtml(word)}'; app.draggedFrom='available'"
                                             class="bg-white border-2 rounded-lg p-2 cursor-move text-xs text-center shadow-sm">
                                            ${this.escapeHtml(word)}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                ${baskets.map(basket => {
                                    const items = this.getBasketDisplay(this.sharedBaskets[basket.id]);
                                    return `
                                        <div ondragover="event.preventDefault()" ondrop="app.handleDrop('${basket.id}')" class="${basket.color} rounded-xl shadow-lg p-4 border-2 border-dashed min-h-48">
                                            <h3 class="font-bold text-black mb-3 text-lg underline decoration-dotted">
                                                ${basket.name}
                                                <span class="ml-2 text-sm font-normal text-gray-500">(${items.length})</span>
                                            </h3>
                                            <div class="grid grid-cols-2 gap-2">
                                                ${items.map(i => `
                                                    <div ${i.isMine ? `draggable="true" ondragstart="app.draggedWord='${this.escapeHtml(i.word)}'; app.draggedFrom='${basket.id}'"` : ''}
                                                         class="${i.isMine ? 'bg-white border-green-400 cursor-move' : 'bg-gray-50 border-gray-300 opacity-60'} border-2 rounded-lg p-2 text-xs text-center">
                                                        ${this.escapeHtml(i.display)} ${i.isMine ? '✓' : ''}
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>`;

                if (database) {
                    database.ref('/status').once('value', (snapshot) => {
                        const countElement = document.getElementById('user-count');
                        if (countElement) countElement.textContent = snapshot.numChildren() || 0;
                    });
                }
            }
        }
        window.addEventListener('DOMContentLoaded', () => { app = new FocusGroupApp(); });
    </script>
</body>
</html>
