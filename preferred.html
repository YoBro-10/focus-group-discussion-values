<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PREFERRED Culture Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { touch-action: manipulation; }
        .selected-word { ring: 4px solid #e11d48 !important; transform: scale(1.05); z-index: 50; }
    </style>
</head>
<body class="bg-rose-50">
    <nav class="bg-white border-b flex justify-center gap-6 p-3 text-[10px] font-black uppercase shadow-sm sticky top-0 z-[100]">
        <a href="index.html" class="text-slate-400 hover:text-indigo-600 transition-colors pb-1">Current Culture</a>
        <a href="preferred.html" class="text-rose-600 border-b-2 border-rose-600 pb-1">● Preferred Culture</a>
    </nav>

    <div id="root">
        <div class="h-screen flex items-center justify-center font-bold text-rose-500 text-center p-4">
            Connecting to PREFERRED Culture Board...
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmjEUCPkpSXSjIu_3Aie4R4VkLg1E-i30",
            authDomain: "focus-group-discussion-word.firebaseapp.com",
            databaseURL: "https://focus-group-discussion-word-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "focus-group-discussion-word",
            storageBucket: "focus-group-discussion-word.firebasestorage.app",
            messagingSenderId: "833887600551",
            appId: "1:833887600551:web:77329c59d24d9b326e4082"
        };

        const initialWords = [
            { text: 'Trust', color: 'bg-blue-100 border-blue-400' }, { text: 'Teamwork', color: 'bg-blue-100 border-blue-400' },
            { text: 'Respect', color: 'bg-blue-100 border-blue-400' }, { text: 'Communication', color: 'bg-blue-100 border-blue-400' },
            { text: 'Care', color: 'bg-blue-100 border-blue-400' }, { text: 'Empowerment', color: 'bg-blue-100 border-blue-400' },
            { text: 'Warm', color: 'bg-blue-100 border-blue-400' }, { text: 'Friendly', color: 'bg-blue-100 border-blue-400' },
            { text: 'Honest', color: 'bg-blue-100 border-blue-400' }, { text: 'Transparent', color: 'bg-blue-100 border-blue-400' },
            { text: 'Innovation', color: 'bg-green-100 border-green-400' }, { text: 'Creativity', color: 'bg-green-100 border-green-400' },
            { text: 'Agility', color: 'bg-green-100 border-green-400' }, { text: 'Experimentation', color: 'bg-green-100 border-green-400' },
            { text: 'Growth', color: 'bg-green-100 border-green-400' }, { text: 'Learning', color: 'bg-green-100 border-green-400' },
            { text: 'Vision', color: 'bg-green-100 border-green-400' }, { text: 'Adaptability', color: 'bg-green-100 border-green-400' },
            { text: 'Genuine', color: 'bg-green-100 border-green-400' },
            { text: 'Stability', color: 'bg-orange-100 border-orange-400' }, { text: 'Consistency', color: 'bg-orange-100 border-orange-400' },
            { text: 'Order', color: 'bg-orange-100 border-orange-400' }, { text: 'Efficiency', color: 'bg-orange-100 border-orange-400' },
            { text: 'Accountability', color: 'bg-orange-100 border-orange-400' }, { text: 'Compliance', color: 'bg-orange-100 border-orange-400' },
            { text: 'Discipline', color: 'bg-orange-100 border-orange-400' }, { text: 'Standardisation', color: 'bg-orange-100 border-orange-400' },
            { text: 'Reliable', color: 'bg-orange-100 border-orange-400' },
            { text: 'Competitive', color: 'bg-purple-100 border-purple-400' }, { text: 'Performance', color: 'bg-purple-100 border-purple-400' },
            { text: 'Service', color: 'bg-purple-100 border-purple-400' }, { text: 'Excellence', color: 'bg-purple-100 border-purple-400' },
            { text: 'Speed', color: 'bg-purple-100 border-purple-400' }, { text: 'Goals', color: 'bg-purple-100 border-purple-400' },
            { text: 'Inspire', color: 'bg-purple-100 border-purple-400' }, { text: 'Confidence', color: 'bg-purple-100 border-purple-400' }
        ];

        const baskets = [
            { id: 'basket1', name: 'Clan Culture (Collaborate)' },
            { id: 'basket2', name: 'Adhocracy Culture (Create)' },
            { id: 'basket3', name: 'Market Culture (Compete)' },
            { id: 'basket4', name: 'Hierarchy Culture (Control)' }
        ];

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        class FocusGroupApp {
            constructor() {
                this.userId = this.getUserId();
                this.myAvailableWords = this.loadMyWords();
                this.sharedBaskets = { basket1: [], basket2: [], basket3: [], basket4: [] };
                this.draggedWord = null;
                this.draggedFrom = null;
                this.loading = true;
                this.currentParticipants = 0;
                this.isAdmin = new URLSearchParams(window.location.search).get('role') === 'admin';
                this.init();
            }

            getUserId() {
                let id = localStorage.getItem('fg-val-id-preferred');
                if (!id) {
                    id = 'u_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('fg-val-id-preferred', id);
                }
                return id;
            }

            loadMyWords() {
                const saved = localStorage.getItem('my-val-list-preferred');
                return saved ? JSON.parse(saved) : [...initialWords];
            }

            saveMyWords() { localStorage.setItem('my-val-list-preferred', JSON.stringify(this.myAvailableWords)); }

            async init() {
                try {
                    await firebase.auth().signInAnonymously();
                    this.setupPresence();
                    database.ref('baskets_preferred').on('value', (s) => {
                        this.sharedBaskets = s.val() || { basket1: [], basket2: [], basket3: [], basket4: [] };
                        this.loading = false;
                        this.render();
                    });
                } catch (e) {
                    document.getElementById('root').innerHTML = `<div class='p-10'>Connection Error: ${e.message}</div>`;
                }
            }

            setupPresence() {
                const statusRef = database.ref('/status_preferred/' + this.userId);
                database.ref('.info/connected').on('value', (s) => {
                    if (s.val()) statusRef.onDisconnect().remove().then(() => statusRef.set(true));
                });
                database.ref('/status_preferred').on('value', (s) => {
                    this.currentParticipants = s.numChildren() || 0;
                    const el = document.getElementById('user-count');
                    if (el) el.textContent = this.currentParticipants;
                });
            }

            handleSelect(wordText, from) {
                if (this.draggedWord === wordText) {
                    this.draggedWord = null;
                    this.draggedFrom = null;
                } else {
                    this.draggedWord = wordText;
                    this.draggedFrom = from;
                }
                this.render();
            }

            async handleDrop(target) {
                if (!this.draggedWord) return;
                const wordText = this.draggedWord;
                const from = this.draggedFrom;
                const wordInfo = initialWords.find(w => w.text === wordText);

                if (from === target) {
                    this.draggedWord = null;
                    this.render();
                    return;
                }

                if (from === 'available') {
                    this.myAvailableWords = this.myAvailableWords.filter(w => w.text !== wordText);
                    this.saveMyWords();
                } else {
                    await database.ref(`baskets_preferred/${from}`).transaction((c) => {
                        if (!c) return c;
                        const idx = c.findIndex(i => i.word === wordText && i.userId === this.userId);
                        if (idx > -1) c.splice(idx, 1);
                        return c;
                    });
                }

                if (target === 'available') {
                    if (!this.myAvailableWords.find(w => w.text === wordText)) {
                        this.myAvailableWords.push(wordInfo);
                        this.saveMyWords();
                    }
                } else {
                    await database.ref(`baskets_preferred/${target}`).transaction((c) => {
                        c = c || [];
                        c.push({ word: wordText, userId: this.userId, color: wordInfo.color });
                        return c;
                    });
                }

                this.draggedWord = null;
                this.draggedFrom = null;
                this.render();
            }

            async clearMyBaskets() {
                if (!confirm("Remove all your words from PREFERRED baskets?")) return;
                const myRecoveredWords = [];
                for (const basketId of Object.keys(this.sharedBaskets)) {
                    await database.ref(`baskets_preferred/${basketId}`).transaction((current) => {
                        if (!current) return current;
                        const updated = current.filter(item => {
                            if (item.userId === this.userId) {
                                myRecoveredWords.push(item.word);
                                return false;
                            }
                            return true;
                        });
                        return updated;
                    });
                }
                myRecoveredWords.forEach(wordText => {
                    const wordInfo = initialWords.find(w => w.text === wordText);
                    if (wordInfo && !this.myAvailableWords.find(poolW => poolW.text === wordText)) {
                        this.myAvailableWords.push(wordInfo);
                    }
                });
                this.saveMyWords();
                this.render();
            }

            async resetAllBaskets() {
                if (confirm('ADMIN: Clear entire PREFERRED board for everyone?')) {
                    await database.ref('baskets_preferred').set({ basket1: [], basket2: [], basket3: [], basket4: [] });
                }
            }

            resetMyPool() {
                if (confirm('Reset your word pool?')) {
                    const used = new Set();
                    Object.values(this.sharedBaskets).forEach(b => {
                        if (Array.isArray(b)) b.forEach(i => { if (i.userId === this.userId) used.add(i.word); });
                    });
                    this.myAvailableWords = initialWords.filter(w => !used.has(w.text));
                    this.saveMyWords();
                    this.render();
                }
            }

            exportToCSV() {
                let csv = "data:text/csv;charset=utf-8,Basket,Word,Count\n";
                baskets.forEach(b => {
                    const items = this.getBasketDisplay(this.sharedBaskets[b.id]);
                    items.forEach(i => { csv += `"${b.name}","${i.word}",${i.count}\n`; });
                });
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csv));
                link.setAttribute("download", "preferred_results.csv");
                link.click();
            }

            getBasketDisplay(items) {
                const groups = {};
                (items || []).forEach(i => {
                    if (!groups[i.word]) groups[i.word] = { count: 0, myCount: 0, color: i.color };
                    groups[i.word].count++;
                    if (i.userId === this.userId) groups[i.word].myCount++;
                });
                return Object.entries(groups).map(([word, d]) => ({
                    word, count: d.count, isMine: d.myCount > 0, color: d.color,
                    display: d.count > 1 ? `${word} (${d.count})` : word
                }));
            }

            escapeHtml(t) { 
                const d = document.createElement('div'); 
                d.textContent = t; 
                return d.innerHTML; 
            }

            render() {
                const root = document.getElementById('root');
                if (this.loading) return;

                root.innerHTML = `
                <div class="min-h-screen p-2 md:p-4 text-slate-900">
                    <div class="max-w-6xl mx-auto">
                        <div class="text-center mb-6">
                            <span class="bg-rose-600 text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-2 inline-block shadow-sm">Phase 2</span>
                            <h1 class="text-xl md:text-3xl font-black uppercase tracking-tighter text-rose-900">PREFERRED Culture Board</h1>
                            <p class="text-slate-500 text-sm font-medium italic">"In an ideal world, how should we behave?"</p>
                            <p class="text-rose-600 font-bold mt-2">👥 Participants: <span id="user-count">${this.currentParticipants}</span></p>
                            
                            <div class="mt-4 flex gap-2 justify-center flex-wrap">
                                <button onclick="app.clearMyBaskets()" class="bg-amber-500 text-white px-4 py-2 rounded-full text-[10px] font-bold uppercase shadow-md hover:bg-amber-600">Clear My Choices</button>
                                <button onclick="app.resetMyPool()" class="bg-emerald-600 text-white px-4 py-2 rounded-full text-[10px] font-bold uppercase shadow-md hover:bg-emerald-700">Refresh Pool</button>
                                ${this.isAdmin ? `
                                    <button onclick="app.exportToCSV()" class="bg-rose-600 text-white px-4 py-2 rounded-full text-[10px] font-bold uppercase shadow-md hover:bg-rose-700">Export CSV</button>
                                    <button onclick="app.resetAllBaskets()" class="bg-rose-900 text-white px-4 py-2 rounded-full text-[10px] font-bold uppercase shadow-md hover:bg-rose-950">Clear All</button>
                                ` : ''}
                            </div>
                        </div>

                        <div ondragover="event.preventDefault()" ondrop="app.handleDrop('available')" onclick="app.handleDrop('available')"
                             class="bg-white rounded-2xl shadow-inner p-4 mb-6 border-2 border-dashed border-rose-200 min-h-24 text-center cursor-pointer">
                            <h2 class="font-black text-[10px] uppercase text-rose-300 mb-3 tracking-widest">Available Pool</h2>
                            <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-9 gap-2">
                                ${this.myAvailableWords.map(w => `
                                    <div draggable="true" ondragstart="app.draggedWord='${this.escapeHtml(w.text)}'; app.draggedFrom='available'"
                                         onclick="event.stopPropagation(); app.handleSelect('${this.escapeHtml(w.text)}', 'available')"
                                         class="${w.color} ${this.draggedWord === w.text ? 'selected-word' : ''} border-2 rounded-lg p-2 cursor-grab text-[10px] font-bold uppercase shadow-sm">
                                        ${this.escapeHtml(w.text)}
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            ${baskets.map(b => {
                                const items = this.getBasketDisplay(this.sharedBaskets[b.id]);
                                return `
                                    <div ondragover="event.preventDefault()" ondrop="app.handleDrop('${b.id}')" onclick="app.handleDrop('${b.id}')"
                                         class="bg-white border-2 border-rose-100 rounded-2xl p-4 min-h-[180px] shadow-lg cursor-pointer hover:border-rose-400 transition-colors">
                                        <h3 class="font-black text-center mb-4 uppercase text-xs border-b-2 border-rose-50 pb-2 text-slate-700">${b.name}</h3>
                                        <div class="grid grid-cols-2 gap-2">
                                            ${items.map(i => `
                                                <div ${i.isMine ? `draggable="true" ondragstart="app.draggedWord='${this.escapeHtml(i.word)}'; app.draggedFrom='${b.id}'" onclick="event.stopPropagation(); app.handleSelect('${this.escapeHtml(i.word)}', '${b.id}')"` : ''}
                                                     class="${i.color} ${i.isMine ? 'ring-2 ring-rose-500' : 'opacity-60'} ${this.draggedWord === i.word && i.isMine ? 'selected-word' : ''} border-2 rounded p-2 text-[10px] font-bold uppercase shadow-sm">
                                                    ${this.escapeHtml(i.display)} ${i.isMine ? '●' : ''}
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>`;
            }
        }

        const app = new FocusGroupApp();
    </script>
</body>
</html>
